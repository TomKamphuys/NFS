[logging]
level = DEBUG
file = tests/test_scanner.log

[nfs]
audio = audio
plugins = plugins
motion_manager = motion_manager

[scanner]
controller = grbl_mock
feed_rate = 35000

[plugins]
plugin_1 = nfs.plugins.cylindrical_measurement_points

[grbl_mock]
type = Mock
grbl_x_axis_config = grbl_x_axis
grbl_y_axis_config = grbl_y_axis
grbl_z_axis_config = grbl_z_axis

[grbl_x_axis]
steps_per_millimeter = 1
maximum_rate = 5000
acceleration = 600

[grbl_y_axis]
steps_per_millimeter = 1
maximum_rate = 5000
acceleration = 600

[grbl_z_axis]
steps_per_millimeter = 1
maximum_rate = 5000
acceleration = 600

[audio]
mode = mock

[sweep]
sweep_dur_s = 0.1
sweep_level_dbfs = -6.0
debug_saves = True
num_sweeps = 1
pre_sil_ms = 10
post_sil_ms = 10
align_to_first_marker = True
mic_tail_taper_ms = 5
H2_TEST_DB = none
H3_TEST_DB = none
PROTECT_HPF_HZ = none
naming_convention = dimitri

[motion_manager]
type = CylindricalMeasurementMotionManager
measurement_points = measurement_points
safe_radius = 87

[measurement_points]
type = CylindricalMeasurementPoints
nr_of_angular_points = 1
nr_of_radial_cap_points = 1
nr_of_vertical_points = 1
cap_spacing = 10
wall_spacing = 10
radius = 100
height = 100
