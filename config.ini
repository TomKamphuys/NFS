[plugins]
plugin_1 = plugins.cylindrical_measurement_points
plugin_2 = plugins.spherical_measurement_points
plugin_3 = plugins.spherical_measurement_points_sorted
plugin_4 = plugins.spherical_measurement_points_arcs
plugin_5 = plugins.spherical_measurement_points_arcs_random

[mock]
type = Mock

[grbl_streamer]
mock = True
baudrate = 115200
step_idle_delay = 255  # ms, 255 is always on

[grbl_x_axis]
steps_per_millimeter = 72.752
maximum_rate = 15000  # mm/min
acceleration = 100  # mm/sec^2
invert_direction = True

[grbl_y_axis]
steps_per_millimeter = 72.752
maximum_rate = 15000  # mm/min
acceleration = 100  # mm/sec^2
invert_direction = False

[grbl_rot_axis]
steps_per_millimeter = 130.37
maximum_rate = 800  # mm/min
acceleration = 10  # mm/sec^2
invert_direction = False

[ESP32DuinoRotation]
type = ESP32DuinoRotation
rotation_mover_controller = fluidnc1

[fluidnc2]
type = ESP32Duino
web_socket = ws://fluidnc2.local:81
grbl_x_axis_config = grbl_x_axis
grbl_y_axis_config = grbl_y_axis

[fluidnc1]
type = ESP32Duino
web_socket = ws://fluidnc.local:81
grbl_x_axis_config = grbl_rot_axis
grbl_y_axis_config = grbl_rot_axis # read, but y axi is not used

[scanner]
rotator = ESP32DuinoRotation  # tic
planar_mover_controller = fluidnc2
feed_rate = 15000

[audio]
mock = True
device_id = 18
sample_rate = 44100  # Hz
minimum_frequency = 20  # Hz
maximum_frequency = 20000  # Hz
duration = 1  # s
padding_time = 1  # s

[measurement_points]
type = SphericalMeasurementPointsArcs
nr_of_points = 5000
wall_spacing = 30  # mm
radius = 320  # mm

# OUTDATED CONFIGS #

## tic settings ##
[tic]
type = TIC
degree_per_step = 1.8
large_gear_nr_of_teeth = 176
small_gear_nr_of_teeth = 12
stepper_step_size = 16  # better name, high,high, high
invert_direction = False

[windows]
port = COM8

[linux]
port = /dev/ttyACM0

[arduino]
type = Arduino
