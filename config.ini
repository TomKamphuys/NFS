[logging]
level = INFO
file = scanner.log
rotation = 10 MB
retention = 1 week

[nfs]
audio = audio
plugins = plugins
motion_manager = motion_manager

[scanner]
controller = grbl_streamer
feed_rate = 35000 # limit feed rate for arc moves

[grbl_streamer]
type = Arduino
set_config = False
grbl_x_axis_config = grbl_x_axis
grbl_y_axis_config = grbl_y_axis
grbl_z_axis_config = grbl_z_axis
baudrate = 115200

[windows]
port = COM9

[linux]
port = /dev/ttyUSB0

[grbl_x_axis]
steps_per_millimeter = 1  # 400  # steps/mm
maximum_rate = 5000  # 11160  # mm/min
acceleration = 600  # 100  # mm/sec^2

[grbl_y_axis]
steps_per_millimeter = 1  # 40  # steps/mm
maximum_rate = 5000  # mm/min
acceleration = 600  # 100  # mm/sec^2

[grbl_z_axis]
steps_per_millimeter = 1  # 600  # steps/degrees
maximum_rate = 5000  # 700  # degrees/min
acceleration = 600 # 10  # degrees/sec^2

[audio]
mock = True
device_id = 0
pre_sweeps = 1
measurement_sweeps = 4
save_raw_measurement = True

[sweep]
type = ExponentialSweep
sample_rate = 44100  # Hz
minimum_frequency = 20  # Hz
maximum_frequency = 20000  # Hz
duration = 1  # s
padding_time = 1  # s

[motion_manager]
type = CylindricalMeasurementMotionManager
measurement_points = measurement_points
safe_radius = 87  # mm

[measurement_points]
type = FileMeasurementPoints
filename = scan_path.csv
